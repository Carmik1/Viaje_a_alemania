<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Carta</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="contenedor gafjust_font">

        <h1>Acaba de llegar un regalo de muy, muy lejos.</h1>

        <h1>¿Qué será?</h1>

        <h3>(Pulsa a Kitty para iniciar el viaje)</h3>

        <button id="avion">

            <img id="kitty"
            src="Diseño sin título.png"
            alt="Kitty">

        </button>

        <p id="estado"></p>

        <p id="indicacion"></p>


        <!-- Carta -->

        <div id="carta">

            <img src="Querida Valeria.png" id="papel">

        </div>

    </div>


<script>

const boton = document.getElementById("avion");

const estado = document.getElementById("estado");

const kitty = document.getElementById("kitty");

const indicacion = document.getElementById("indicacion");

const carta = document.getElementById("carta");


let llego = false;


boton.addEventListener("click", ()=>{


    // SEGUNDO CLICK

    if(llego){

        boton.style.display = "none";

        estado.style.display = "none";

        indicacion.style.display = "none";

        carta.style.display = "block";

        return;

    }


    // PRIMER CLICK


    boton.disabled = true;

    boton.classList.add("palpitar");

    estado.textContent="Viajando... ✈️";


    setTimeout(()=>{


        boton.classList.remove("palpitar");


        estado.textContent="¡Llegamos a Alemania 🇩🇪!";


        indicacion.textContent="(Vuelve a pulsar a Kitty)";


        kitty.src="Kitty.png";


        boton.disabled=false;


        llego=true;


    },2000);


});

</script>

</body>

</html>
